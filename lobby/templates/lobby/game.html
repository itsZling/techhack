{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="p-4" style="position: relative; min-height: 100vh; background-color: #fcead5;">
    <div class="container">

        <div class="row align-items-center mb-4">
            <div class="col-4"></div>
            <div class="col-4 text-center">
                <h2 class="stardew-font m-0">Round 1 / {{ rounds }}</h2>
                <div class="mt-2">
                    <span class="badge bg-dark stardew-font" style="font-size: 0.7rem;">{{ mode }} Mode</span>
                    <span class="stardew-font ms-2" style="font-size: 0.9rem; opacity: 0.8;">{{ detail }}</span>
                </div>
            </div>
            <div class="col-4 text-end">
                <h2 class="stardew-font m-0" style="color: #d23c3c !important;">00:XX</h2>
            </div>
        </div>

        <div class="row justify-content-center">
            
            <div class="col-lg-3 position-absolute start-0 ms-4 d-none d-lg-block" style="z-index: 10;">
                <div class="lobby-main-panel p-2">
                    <h3 class="stardew-font text-center mb-2" style="font-size: 1.5rem !important;">Leaderboard</h3>
                    <div id="player-list" class="d-flex flex-column gap-2">
                        <div class="alert cozy-card d-flex justify-content-between align-items-center mb-0 p-2">
                            <span><strong>Player 1</strong></span>
                            <span class="badge bg-dark">1,250</span>
                        </div>
                        <div class="alert cozy-card d-flex justify-content-between align-items-center mb-0 p-2" style="opacity: 0.9;">
                            <span>Player 2</span>
                            <span class="badge bg-dark">980</span>
                        </div>
                        <div class="alert cozy-card d-flex justify-content-between align-items-center mb-0 p-2" style="opacity: 0.8;">
                            <span>Player 3</span>
                            <span class="badge bg-dark">450</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-6 text-center">
                <div class="mb-4">
                    <div class="lobby-main-panel p-2 d-inline-block">
                        <img src="{% static 'img/sample.jpg' %}" 
                             class="img-fluid" 
                             alt="Guess this song" 
                             style="max-height: 400px; display: block;">
                    </div>
                </div>

                <div class="my-4" style="border-top: 4px solid #bf7858; opacity: 0.3;"></div>

                <div class="mt-3">
                    <p class="stardew-font h4 mb-3">Guess the song!</p>
                    <div class="input-group">
                        <input type="text" id="songGuess" 
                               class="form-control custom-pixel-input py-2" 
                               placeholder="Start typing the song name...">
                        <button class="btn btn-pixel-action" type="button" style="font-size: 1.2rem; min-width: 100px;">
                            Submit
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock content %}
