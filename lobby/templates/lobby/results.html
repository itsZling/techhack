{% extends 'base.html' %}
{% block content %}

<style>
  @import url("https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=VT323&display=swap");

  * {
    font-family: 'VT323', monospace;
  }

  .results-wrapper {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-color: #f3efe6;
  }

  .results-title {
    font-size: 3.3rem;
    color: #bf7858;
    letter-spacing: -1px;
    margin-bottom: 0.25rem;
    text-align: center;
  }

  .results-subtitle {
    color: #b8ada1;
    font-size: 1.4rem;
    margin-bottom: 1.2rem;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .leaderboard {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .leaderboard {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2rem;
    max-height: calc(3 * 74px + 2 * 0.75rem);
    overflow-y: auto;
    padding-right: 4px;
  }

  .leaderboard::-webkit-scrollbar {
    width: 6px;
  }

  .leaderboard::-webkit-scrollbar-track {
    background: transparent;
  }

  .leaderboard::-webkit-scrollbar-thumb {
    background: #bf7858;
    border-radius: 999px;
  }

  .player-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 14px;
    background: #ffd3ac;
    border: 3px solid #b8ada1;
    transition: transform 0.2s ease, border-color 0.4s ease;
    animation: slideIn 0.4s ease both;
  }

  .player-card:nth-child(1) { animation-delay: 0.05s; }
  .player-card:nth-child(2) { animation-delay: 0.25s; }
  .player-card:nth-child(3) { animation-delay: 0.45s; }

  .player-card:hover {
    border-color: #7bae7f;
  }

  .player-card.first-place {
    border-color: #DAA425;
  }

  .player-card.first-place:hover {
    border-color: #5a8c5a;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .rank {
    font-size: 1.6rem;
    min-width: 28px;
    font-weight: 600;
    color: #bf7858;
    text-align: center;
    text-shadow:
    -1px -1px 0 #2e3c69,
     1px -1px 0 #2e3c69,
    -1px  1px 0 #2e3c69,
     1px  1px 0 #2e3c69;
  }

  .rank-1 {
    color: #DAA425;
  }
  .rank-2 {
    color: #c0c0c0;
  }
  .rank-3 {
    color: #cd7f32;
  }

  .player-name {
    flex: 1;
    font-size: 1.55rem;
    font-weight: 600;
    color: #bf7858;
  }

  .player-score {
    font-size: 1.55rem;
    font-weight: 600;
    color: #bf7858;
  }

  .player-score span {
    font-size: 1.25rem;
    font-weight: 500;
    color: #b8ada1;
    margin-left: 2px;
  }

  .action-buttons {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 480px;
  }

  .btn-action {
    background-color: #ffd3ac;
    color: #bf7858;
    flex: 1;
    padding: 0.85rem 1rem;
    border: 3px solid #bf7858;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    text-align: center;
  }

  .btn-lobby:hover {
    background: #7bae7f;
  }

  .btn-leave:hover {
    background: #dca1a1;
  }
</style>

<div class="results-wrapper">
  <h1 class="results-title">Results</h1>
  <p class="results-subtitle">Round Complete!</p>

  <div class="leaderboard">

    <div class="player-card first-place">
      <div class="rank rank-1"><span class="rank-medal">1st</span></div>
      <div class="player-name">Player 1</div>
      <div class="player-score">25 <span>pts</span></div>
    </div>

    <div class="player-card">
      <div class="rank rank-2"><span class="rank-medal">2nd</span></div>
      <div class="player-name">Player 3</div>
      <div class="player-score">15 <span>pts</span></div>
    </div>

    <div class="player-card">
      <div class="rank rank-3"><span class="rank-medal">3rd</span></div>
      <div class="player-name">Player 2</div>
      <div class="player-score">6 <span>pts</span></div>
    </div>

    <!--
      {% for player in players %}
        <div class="player-card" style="animation-delay: calc({{ forloop.counter }} * 0.2s)">
          ...
        </div>
      {% endfor %}
    -->
    <div class="player-card">
      <div class="rank"><span class="rank-medal">4th</span></div>
      <div class="player-name">Player 4</div>
      <div class="player-score">2 <span>pts</span></div>
    </div>

  </div>

  <div class="action-buttons">
    <a href="{% url 'lobby.index' %}" class="btn-action btn-lobby">↩ Return to Lobby</a>
    <a href="/" class="btn-action btn-leave">Leave Lobby</a>
  </div>
</div>

{% endblock content %}
