{% extends 'base.html' %}
{% block content %}
<div class="p-3">
    <div class="container">
        <div class="row mt-3">
            <div class="col mx-auto text-center mb-3">
                <h4>Welcome to Lobby: <span class="text-primary">{{ lobby_id }}</span></h4>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <textarea id="chat-log" class="form-control mb-2" rows="10" readonly></textarea>
                <div class="input-group">
                    <input id="chat-message-input" type="text" class="form-control" placeholder="Type a message...">
                    <button id="chat-message-submit" class="btn btn-primary" type="button">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const lobbyId = "{{ lobby_id }}";
    
    // Auto-detect if we are using ws:// (local) or wss:// (Railway)
    const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";

    // Connect to your routing.py URL
    const chatSocket = new WebSocket(
        wsScheme + '://' + window.location.host + '/ws/lobby/' + lobbyId + '/'
    );

    // When a message is RECEIVED from the server
    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const chatLog = document.querySelector('#chat-log');
        chatLog.value += (data.user + ': ' + data.message + '\n');
        chatLog.scrollTop = chatLog.scrollHeight; // Auto-scroll to bottom
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed unexpectedly');
    };

    // Allow hitting "Enter" to send
    document.querySelector('#chat-message-input').focus();
    document.querySelector('#chat-message-input').onkeyup = function(e) {
        if (e.key === 'Enter') { 
            document.querySelector('#chat-message-submit').click();
        }
    };

    // When the SEND button is clicked
    document.querySelector('#chat-message-submit').onclick = function(e) {
        const messageInputDom = document.querySelector('#chat-message-input');
        const message = messageInputDom.value;
        
        // Push the message TO the server
        chatSocket.send(JSON.stringify({
            'message': message
        }));
        
        messageInputDom.value = ''; // Clear the input field
    };
</script>
{% endblock content %}
