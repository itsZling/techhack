{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="lobby-main-panel p-4 shadow-lg w-100" style="max-width: 900px;">
        <h2 class="stardew-font text-center mb-4" style="color: #634d31;">Lobby</h2>
        <div class="row">
            <div class="col-md-5 d-flex flex-column border-end border-dark border-2">
                
                <div id="player-list-container" class="cozy-inset p-3 mb-3" style="height: 150px; overflow-y: auto;">
                    <div id="player-list" class="d-flex flex-column gap-2"></div>
                </div>

                <div class="chat-section mb-3">
                    <p class="stardew-font mb-1" style="font-size: 1rem;">Lobby Chat</p>
                    <textarea id="chat-log" class="form-control custom-pixel-input mb-2" rows="4" readonly style="font-size: 0.8rem;"></textarea>
                    <div class="input-group input-group-sm">
                        <input id="chat-message-input" type="text" class="form-control custom-pixel-input" placeholder="Say hi...">
                        <button id="chat-message-submit" class="btn btn-dark text-white stardew-font" type="button" style="font-size: 0.8rem;">Send</button>
                    </div>
                </div>

                <div class="round-ammount-selection">
                    <p class="stardew-font mb-1" style="font-size: 1.2rem;">Round Amount</p>
                    <input type="hidden" id="selected-rounds" name="rounds" value="5">
                    <div class="d-flex gap-2 mb-4">
                        <button class="btn-pixel-small active" data-value="5">5</button>
                        <button class="btn-pixel-small" data-value="15">15</button>
                        <button class="btn-pixel-small" data-value="30">30</button>
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button class="btn-pixel-action btn-start">START</button>
                    <button class="btn-pixel-action btn-leave">QUIT</button>
                </div>
            </div>

            <div class="col-md-7 ps-4">
                <h3 class="stardew-font border-bottom border-dark pb-1 mb-4">Game Mode</h3>
                
                <div class="mb-3">
                    <div class="mb-3 d-flex align-items-center gap-2">
                        <input type="radio" name="game-mode" value="genre" id="mode-genre" checked class="pixel-radio">
                        <label for="mode-genre" class="stardew-font d-block mb-1">Genre</label>
                    </div>
                    <select class="form-select custom-pixel-input" id="genre-select">
                        <option value="none">Pick a genre...</option>
                        <option value="pop">Pop</option>
                        <option value="folk">Folk</option>
                        <option value="rock">Rock</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <div class="mt-3 mb-3 d-flex align-items-center gap-2">
                        <input type="radio" name="game-mode" value="artist" id="artist-input" class="pixel-radio">
                        <label for="artist-input" class="stardew-font d-block mb-1">Artist</label>
                    </div>
                    <select class="form-select custom-pixel-input" id="mode-artist">
                        <option value="none">Pick an artist...</option>
                        <option value="taylor_swift">Taylor Swift</option>
                        <option value="hozier">Hozier</option>
                        <option value="bruno_mars">Bruno Mars</option>
                        <option value="set_it_off">Set It Off</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <div class="mt-3 mb-3 d-flex align-items-center gap-2">
                        <input type="radio" name="game-mode" value="spotify" id="mode-spotify" class="pixel-radio">
                        <label for="mode-spotify" class="stardew-font d-block mb-1">Playlist</label>
                    </div>
                    <input type="text" id="spotify-input" class="form-control custom-pixel-input" placeholder="Spotify Link here...">
                </div>
            </div>
        </div>

        <div class="game-code-display mt-4 text-center">
            <span class="stardew-font" style="font-size: 1.2rem;">CODE:</span> 
            <span id="room-code-text" class="stardew-font text-primary" style="font-size: 2rem; letter-spacing: 4px;">{{ lobby_id }}</span>
        </div>
    </div>
</div>
       
<script>
    // --- UI LOGIC ---
    const roundBtns = document.querySelectorAll('.btn-pixel-small');
    const roundsInput = document.getElementById('selected-rounds');
    
    roundBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            roundBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            roundsInput.value = btn.dataset.value;
        });
    });

    document.querySelector('.btn-leave').onclick = () => window.location.href = "{% url 'home.index' %}";


    // --- WEBSOCKET LOGIC ---
    const lobbyId = "{{ lobby_id }}";
    const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    
    const chatSocket = new WebSocket(
        wsScheme + '://' + window.location.host + '/ws/lobby/' + lobbyId + '/'
    );

    // 1. Receiving Messages from Server
    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        // If it's a chat message, update the chat log
        if (data.message) {
            const chatLog = document.querySelector('#chat-log');
            chatLog.value += (data.user + ': ' + data.message + '\n');
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // If it's a new player joining, update the player list
        if (data.type === 'new_player') {
            const playerList = document.getElementById('player-list');
            const isHost = playerList.children.length === 0;
            const newTag = document.createElement('div');            
            newTag.className = "alert cozy-card d-flex justify-content-between align-items-center shadow-sm mb-2 w-100 p-2";
            
            let badgeHTML = '';
            if (isHost) {
                badgeHTML = `<span class="badge rounded-pill bg-dark stardew-font" style="font-size: 0.7rem; display: inline-block !important;">HOST</span>`;
            } else {
                // Hide start button for non-hosts
                const startBtn = document.querySelector('.btn-start');
                if(startBtn) startBtn.style.display = 'none';
            }
            newTag.innerHTML = `<strong>${data.username}</strong> ${badgeHTML}`;
            playerList.append(newTag);
        }
    };

    chatSocket.onclose = function(e) {
        console.error('Lobby socket closed unexpectedly');
    };

    // 2. Sending Chat Messages
    const messageInput = document.querySelector('#chat-message-input');
    const messageSubmit = document.querySelector('#chat-message-submit');

    messageInput.onkeyup = function(e) {
        if (e.key === 'Enter') messageSubmit.click();
    };

    messageSubmit.onclick = function(e) {
        const message = messageInput.value;
        if (message) {
            chatSocket.send(JSON.stringify({
                'message': message
            }));
            messageInput.value = ''; 
        }
    };

    // 3. Sending Game Start Action
    document.querySelector('.btn-start').addEventListener('click', function(){
        const selectedMode = document.querySelector('input[name="game-mode"]:checked').value;
        const rounds = roundsInput.value;
        let detail = "";

        if (selectedMode === 'genre') {
            detail = document.getElementById('genre-select').value;
        } else if (selectedMode === 'artist') {
            detail = document.getElementById('mode-artist').value;
        } else {
            detail = document.getElementById('spotify-input').value;
        }

        chatSocket.send(JSON.stringify({
            'type': 'start_game',
            'game_mode': selectedMode,
            'rounds': rounds,
            'detail': detail
        }));
        
        // Temporarily send them to the game page directly for testing
        window.location.href = "{% url 'game.index' %}";
    });
</script>
{% endblock content %}
