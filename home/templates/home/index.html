{% extends 'base.html' %}
{% block content %}

<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="lobby-main-panel p-5 shadow-lg text-center" style="max-width: 600px; width: 100%;">
        
        <h2 class="stardew-font mb-2" style="color: #634d31; font-size: 3.5rem;">Are you a musical meister?</h2>
        
        {% if user.is_authenticated %}
            <p class="stardew-font mb-4" style="font-size: 1.8rem; color: #bf7858;">Play with friends!</p>
            
            <a class="btn-pixel-action text-decoration-none d-inline-block mb-4 px-5 py-3 shadow-sm" href="{% url 'home.create_lobby' %}">
                Make a Lobby
            </a>

            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1" style="border-top: 4px dashed #bf7858; opacity: 0.6;">
                <span class="mx-3 stardew-font" style="color: #bf7858; font-size: 1.5rem;">OR</span>
                <hr class="flex-grow-1" style="border-top: 4px dashed #bf7858; opacity: 0.6;">
            </div>
            
            <form action="{% url 'home.join_lobby' %}" method="POST" class="d-flex justify-content-center">
                {% csrf_token %}
                <div class="input-group input-group-lg shadow-sm" style="max-width: 400px;">
                    <input type="text" name="lobby_code" class="form-control custom-pixel-input" placeholder="Enter Code (e.g. AB12XY)" required>
                    <button class="btn btn-dark stardew-font text-white px-4" type="submit" style="background-color: #634d31; border: 3px solid #634d31; font-size: 1.4rem;">Join</button>
                </div>
            </form>

        {% else %}
            <p class="stardew-font mb-5 mt-4" style="font-size: 1.8rem; color: #bf7858;">Login before you play!</p>
            <div class="d-flex justify-content-center gap-3">
                <a class="btn-pixel-action text-decoration-none d-inline-block px-4 py-2 shadow-sm" href="{% url 'account.login' %}">Login</a>
                <a class="btn-pixel-action text-decoration-none d-inline-block px-4 py-2 shadow-sm" style="background-color: #634d31; color: #ffd3ac; border-color: #4a3822;" href="{% url 'account.signup' %}">Sign up</a>
            </div>
        {% endif %}

    </div>
</div>

{% endblock content %}
