{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>{{ template_data.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>


  <style>
    .stardew-font {
        font-family: 'VT323', monospace;
        font-size: 2rem;
        color: #bf7858; 
    }
  </style>
    <!-- Header -->
  <body>
    <nav class="p-2 navbar navbar-expand-lg" style="background-color: #bf7858; border-bottom: 4px solid #634d31;">
      <div class="container">
        <a class="navbar-brand stardew-font text-white mb-0" href="{% url 'home.index' %}" style="font-size: 2.5rem; text-shadow: 2px 2px 0px #634d31;">
            Song Meister
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto navbar-ml stardew-font" style="font-size: 1.4rem;">
            <a class="nav-link text-white text-decoration-none px-3" href="{% url 'home.index' %}">Home</a>
            <a class="nav-link text-white text-decoration-none px-3" href="{% url 'lobby.index' lobby_id='general' %}">Lobby</a>
            <a class="nav-link text-white text-decoration-none px-3" href="{% url 'game.index' %}">Game</a>
            
            <div class="vr bg-white mx-2 d-none d-lg-block"></div>
            
            {% if user.is_authenticated %}
              <a class="nav-link text-white px-3" href="{% url 'account.logout' %}">Logout ({{ user.username }})</a>
            {% else %}
              <a class="nav-link text-white px-3" href="{% url 'account.login' %}">Login</a>
              <a class="nav-link text-white px-3" href="{% url 'account.signup' %}">Sign up</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    <!-- Header -->

    {% block content %}
    {% endblock %}
    <!-- Footer -->
    <section class="p-3 ms-footer-bottom stardew-font" style="background-color: #634d31; color: #ffd3ac; font-size: 1.2rem; border-top: 4px solid #bf7858;">
      <div class="container d-flex justify-content-center text-center">
        <div>
          <span>&copy; 2026 SONG MEISTER. BUILT WITH DJANGO & CHANNELS.</span>
        </div>
      </div>
    </section>
    <!-- Footer -->
  </body>
</html>
