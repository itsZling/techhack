{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 160px);">
    <div class="lobby-main-panel p-5 shadow-lg w-100" style="max-width: 500px; background-color: #ffd3ac; border: 6px solid #634d31; border-radius: 8px; box-shadow: 8px 8px 0px rgba(99, 77, 49, 0.5);">
        
        <h2 class="stardew-font text-center mb-4" style="color: #634d31; font-size: 3.5rem;">Sign Up</h2>
        
        <form method="POST" class="django-form-stardew">
            {% csrf_token %}
            {{ template_data.form.as_p }}
            
            <div class="text-center mt-4">
                <button type="submit" class="btn w-100 stardew-font" style="background-color: #558b2f; color: white; border: 4px solid #33691e; padding: 10px; font-size: 1.8rem; text-shadow: 2px 2px 0px #33691e; box-shadow: 4px 4px 0px rgba(51, 105, 30, 0.5);">SIGN UP</button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
