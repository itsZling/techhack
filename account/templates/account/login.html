{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 160px);">
    <div class="lobby-main-panel p-5 shadow-lg w-100" style="max-width: 500px; background-color: #ffd3ac; border: 6px solid #634d31; border-radius: 8px; box-shadow: 8px 8px 0px rgba(99, 77, 49, 0.5);">
        
        <h2 class="stardew-font text-center mb-4" style="color: #634d31; font-size: 3.5rem;">Login</h2>
        
        {% if template_data.error %}
        <div class="alert text-center stardew-font mb-4" style="background-color: #e57373; color: white; border: 4px solid #b71c1c; font-size: 1.2rem;" role="alert">
            {{ template_data.error }}
        </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="stardew-font mb-1" style="color: #634d31; font-size: 1.5rem;">Username</label>
                <input id="username" type="text" name="username" required autocomplete="username" class="form-control" style="border: 4px solid #634d31; background-color: #fff4e6; border-radius: 4px; padding: 10px;">
            </div>

            <div class="mb-4">
                <label for="password" class="stardew-font mb-1" style="color: #634d31; font-size: 1.5rem;">Password</label>
                <input id="password" type="password" name="password" required autocomplete="current-password" class="form-control" style="border: 4px solid #634d31; background-color: #fff4e6; border-radius: 4px; padding: 10px;">
            </div>
            
            <div class="text-center mt-5">
                <button type="submit" class="btn w-100 stardew-font" style="background-color: #558b2f; color: white; border: 4px solid #33691e; padding: 10px; font-size: 1.8rem; text-shadow: 2px 2px 0px #33691e; box-shadow: 4px 4px 0px rgba(51, 105, 30, 0.5);">LOGIN</button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
